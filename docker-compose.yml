version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: instrument_catalogue

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

  api:
    image: instrument-catalogue:latest
    container_name: instrument-catalogue

    depends_on:
      - postgres
      - redis

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=instrument_catalogue;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379

volumes:
  postgres-data:
  redis-data: